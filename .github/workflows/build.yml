name: Build NOVA ISO

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore: [ 'README.md', '.gitignore', 'screenshots/**' ]

# Only one build at a time — a new push cancels the previous in-progress build.
concurrency:
  group: nova-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: false
          docker-images: true

      - name: Build the NOVA ISO
        run: |
          chmod +x build/*.sh
          find overlay/usr/local/bin -type f -exec chmod +x {} +
          sudo WORK="$PWD/build/out" ISO_OUT="$PWD/nova.iso" build/build.sh
          ls -lh nova.iso

      - name: Boot-test in QEMU (UEFI + BIOS) and screenshot
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf imagemagick python3
          # Grant KVM access if the runner exposes it (fast boot → reaches desktop).
          sudo chmod 666 /dev/kvm 2>/dev/null || true
          ls -l /dev/kvm 2>/dev/null || echo "no /dev/kvm — will use TCG"
          chmod +x build/qemu-smoke.sh
          build/qemu-smoke.sh "$PWD/nova.iso" uefi shots || true
          build/qemu-smoke.sh "$PWD/nova.iso" bios shots || true
          echo "=== captured screenshots ==="
          ls -l shots || true
          # Fail loudly if QEMU captured nothing — a silent 'pass' is what bit us.
          if [ -z "$(ls -A shots 2>/dev/null)" ]; then
            echo "ERROR: QEMU produced no screenshots — boot-test did not run."; exit 1
          fi

      - name: Upload boot screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-screenshots
          path: shots/
          retention-days: 7

      - name: Publish screenshots to the repo (so they're always viewable)
        if: always()
        run: |
          git config user.name "nova-ci"
          git config user.email "ci@nova.local"
          mkdir -p screenshots
          rm -f screenshots/*.png
          cp shots/*.png screenshots/ 2>/dev/null || true
          # a tiny index so the GitHub folder view is self-explanatory
          {
            echo "# NOVA boot screenshots"
            echo ""
            echo "Auto-captured in CI by booting the ISO in QEMU (UEFI + BIOS)."
            echo "Build run: ${{ github.run_id }} — commit ${GITHUB_SHA:0:7}"
            echo ""
            for f in screenshots/*.png; do [ -e "$f" ] && echo "- $(basename "$f")"; done
          } > screenshots/README.md
          git add screenshots
          git commit -m "ci: boot screenshots from run ${{ github.run_id }}" || { echo "no changes"; exit 0; }
          git pull --rebase origin main || true
          git push origin HEAD:main || true

      - name: Upload ISO to Cloudflare R2
        if: ${{ success() }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET:     ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "${R2_ACCOUNT_ID:-}" ]; then echo "No R2 secrets — skipping upload"; exit 0; fi
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp "$PWD/nova.iso" "s3://${R2_BUCKET}/nova-installer-x86_64.iso" \
            --endpoint-url "$ENDPOINT" --no-progress
          echo "Uploaded nova-installer-x86_64.iso"
