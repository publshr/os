---
# Consumer welcome page: no support/issues/donate/release links, and an
# offline-friendly requirements check (don't block when there's no internet).
showSupportUrl:      false
showKnownIssuesUrl:  false
showReleaseNotesUrl: false
showDonateUrl:       false

requirements:
    requiredStorage:   12
    requiredRam:       1.5
    internetCheckUrl:  ""
    check:
        - storage
        - ram
        - root
    required:
        - storage
        - ram
        - root
