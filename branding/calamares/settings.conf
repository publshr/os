---
# NOVA installer flow: welcome → create account → erase & install → done.
# Technical screens (locale/keyboard/partition UI/summary) are hidden; the
# work still runs headlessly in the exec phase.
modules-search: [ local ]

sequence:
- show:
  - welcome
  - users
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - initramfscfg
  - initramfs
  - grubcfg
  - bootloader
  - umount
- show:
  - finished

branding: nova
prompt-install: false
dont-chroot: false
disable-cancel-during-exec: true
quit-at-end: false
